<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="720" fill="#f8fafc"/>

  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>

  <!-- ═══ TITLE ═══ -->
  <text x="480" y="36" text-anchor="middle" font-size="26" font-weight="700" fill="#1e293b">RedAGI 系统架构图</text>

  <!-- ═══ LAYER 1: React Frontend ═══ -->
  <rect x="180" y="60" width="600" height="72" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="180" y="60" width="600" height="26" rx="8" fill="#eff6ff"/>
  <rect x="180" y="78" width="600" height="8" fill="#eff6ff"/>
  <text x="480" y="79" text-anchor="middle" font-size="16" font-weight="600" fill="#2563eb">🌐 React 前端 (Vite SPA)</text>
  <text x="480" y="108" text-anchor="middle" font-size="15" fill="#64748b">用户界面 · 会话管理 · WebSocket 实时通信 · Markdown 渲染</text>
  <text x="480" y="124" text-anchor="middle" font-size="13" fill="#94a3b8">Port 5173 (Dev) | 路由: /login /dashboard</text>

  <!-- ═══ Bidirectional arrows: Frontend ↔ Backend ═══ -->
  <line x1="480" y1="132" x2="480" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="380" y1="160" x2="580" y2="160" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="380" y1="160" x2="380" y2="132" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="510" y="155" font-size="13" fill="#2563eb">WebSocket / HTTP (REST)</text>

  <!-- ═══ LAYER 2: FastAPI Backend Container ═══ -->
  <rect x="40" y="172" width="880" height="376" rx="12" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="55" y="160" width="190" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="150" y="176" text-anchor="middle" font-size="15" font-weight="600" fill="#475569">FastAPI 后端 (Port 8000)</text>

  <!-- ── 路由层 ── -->
  <rect x="70" y="196" width="250" height="54" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="195" y="218" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">📡 路由层</text>
  <text x="195" y="240" text-anchor="middle" font-size="13" fill="#94a3b8">auth / chat / sessions / monitor</text>
  <line x1="320" y1="223" x2="345" y2="223" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-gray)"/>

  <!-- ── Session 管理器 ── -->
  <rect x="345" y="196" width="320" height="54" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="505" y="218" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">📋 Session 管理器</text>
  <text x="505" y="240" text-anchor="middle" font-size="13" fill="#94a3b8">project_manager.py — 创建 / 查找 / 销毁 Session</text>

  <!-- ── 认证中间件 ── -->
  <rect x="695" y="196" width="200" height="54" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="795" y="218" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">🔒 认证中间件</text>
  <text x="795" y="240" text-anchor="middle" font-size="13" fill="#94a3b8">JWT 令牌 · bcrypt 密码哈希</text>
  <line x1="695" y1="223" x2="665" y2="223" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-gray)"/>

  <!-- ═══ Arrow: Session 管理器 → Core Engine ═══ -->
  <line x1="505" y1="250" x2="505" y2="282" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="523" y="272" font-size="13" fill="#ea580c">管理</text>

  <!-- ═══ Session 核心引擎 ═══ -->
  <rect x="180" y="288" width="600" height="104" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="180" y="288" width="600" height="28" rx="10" fill="#eff6ff"/>
  <rect x="180" y="306" width="600" height="10" fill="#eff6ff"/>
  <text x="480" y="307" text-anchor="middle" font-size="18" font-weight="600" fill="#2563eb">⚙️ Session 核心引擎 (Agents.py)</text>

  <!-- Agent pills: 600px wide, 5×76 + 4×16 = 444px, (600-444)/2 = 78 left -->
  <rect x="258" y="324" width="76" height="28" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="296" y="343" text-anchor="middle" font-size="13" fill="#16a34a">Leader</text>
  <rect x="350" y="324" width="76" height="28" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="388" y="343" text-anchor="middle" font-size="13" fill="#16a34a">Recon</text>
  <rect x="442" y="324" width="76" height="28" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="480" y="343" text-anchor="middle" font-size="13" fill="#16a34a">Analysis</text>
  <rect x="534" y="324" width="76" height="28" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="572" y="343" text-anchor="middle" font-size="13" fill="#16a34a">Attack</text>
  <rect x="626" y="324" width="76" height="28" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="664" y="343" text-anchor="middle" font-size="13" fill="#16a34a">Report</text>

  <text x="480" y="382" text-anchor="middle" font-size="13" fill="#94a3b8">5 个 AI Agent · 消息队列 &amp; 管理器 · 20+ 结构化工具 · Checkpoint 系统</text>

  <!-- ═══ Arrows: Core Engine → Services ═══ -->
  <line x1="290" y1="392" x2="230" y2="442" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="392" x2="480" y2="442" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="670" y1="392" x2="730" y2="442" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ═══ Service Boxes ═══ -->
  <rect x="140" y="446" width="180" height="66" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="140" y="446" width="180" height="24" rx="8" fill="#eff6ff"/>
  <rect x="140" y="462" width="180" height="8" fill="#eff6ff"/>
  <text x="230" y="463" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">🧠 LLM API</text>
  <text x="230" y="488" text-anchor="middle" font-size="14" fill="#64748b">DeepSeek V4 / 通义千问</text>
  <text x="230" y="504" text-anchor="middle" font-size="12" fill="#94a3b8">OpenAI 兼容协议</text>

  <rect x="390" y="446" width="180" height="66" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="390" y="446" width="180" height="24" rx="8" fill="#fff7ed"/>
  <rect x="390" y="462" width="180" height="8" fill="#fff7ed"/>
  <text x="480" y="463" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">💻 Kali SSH</text>
  <text x="480" y="488" text-anchor="middle" font-size="14" fill="#64748b">asyncssh 连接</text>
  <text x="480" y="504" text-anchor="middle" font-size="12" fill="#94a3b8">非交互式命令执行</text>

  <rect x="640" y="446" width="180" height="66" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="640" y="446" width="180" height="24" rx="8" fill="#f0fdf4"/>
  <rect x="640" y="462" width="180" height="8" fill="#f0fdf4"/>
  <text x="730" y="463" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">🗄️ PostgreSQL</text>
  <text x="730" y="488" text-anchor="middle" font-size="14" fill="#64748b">LangGraph Checkpoint</text>
  <text x="730" y="504" text-anchor="middle" font-size="12" fill="#94a3b8">业务数据持久化</text>

  <!-- ═══ LAYER 3: External Services ═══ -->
  <rect x="40" y="532" width="880" height="74" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="554" font-size="15" font-weight="600" fill="#475569">🔌 外部服务</text>

  <rect x="125" y="560" width="180" height="34" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="215" y="576" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">奇安信 Hunter</text>
  <text x="215" y="590" text-anchor="middle" font-size="12" fill="#94a3b8">网络空间测绘</text>

  <rect x="390" y="560" width="180" height="34" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="576" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Tavily MCP</text>
  <text x="480" y="590" text-anchor="middle" font-size="12" fill="#94a3b8">联网搜索</text>

  <rect x="655" y="560" width="180" height="34" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="745" y="576" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Kali Linux 主机</text>
  <text x="745" y="590" text-anchor="middle" font-size="12" fill="#94a3b8">远程 SSH 渗透</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="700" y="622" width="230" height="82" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="815" y="640" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">图例</text>
  <line x1="712" y1="656" x2="742" y2="656" stroke="#2563eb" stroke-width="1.5"/>
  <text x="752" y="660" font-size="12" fill="#64748b">HTTP / WebSocket 请求</text>
  <line x1="712" y1="674" x2="742" y2="674" stroke="#ea580c" stroke-width="1.5"/>
  <text x="752" y="678" font-size="12" fill="#64748b">内部控制 / 管理流</text>
  <line x1="712" y1="692" x2="742" y2="692" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="752" y="696" font-size="12" fill="#64748b">异步 / 外部调用</text>
</svg>
